<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ClinicCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-heartbeat"></i> ClinicCare</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="patients.html">Patients</a></li>
                    <li class="nav-item"><a class="nav-link" href="doctors.html">Doctors</a></li>
                    <li class="nav-item"><a class="nav-link" href="appointments.html">Appointments</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container page-wrapper">
        <div class="page-header">
            <h1 class="page-title">Dashboard Overview</h1>
        </div>

        <div class="row">
            <div class="col-md-3">
                <div class="card card-stat">
                    <div class="card-body stat-body">
                        <div class="stat-icon primary"><i class="fas fa-users"></i></div>
                        <div class="stat-content">
                            <div class="stat-title">Total Patients</div>
                            <div class="stat-value" id="stat-patients">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-stat">
                    <div class="card-body stat-body">
                        <div class="stat-icon success"><i class="fas fa-user-md"></i></div>
                        <div class="stat-content">
                            <div class="stat-title">Total Doctors</div>
                            <div class="stat-value" id="stat-doctors">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-stat">
                    <div class="card-body stat-body">
                        <div class="stat-icon warning"><i class="fas fa-calendar-check"></i></div>
                        <div class="stat-content">
                            <div class="stat-title">Appointments</div>
                            <div class="stat-value" id="stat-appointments">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-stat">
                    <div class="card-body stat-body">
                        <div class="stat-icon danger"><i class="fas fa-calendar-times"></i></div>
                        <div class="stat-content">
                            <div class="stat-title">Cancelled</div>
                            <div class="stat-value" id="stat-cancelled">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title fw-bold mb-4 text-dark" style="font-size: 1.1rem; text-transform:none">Recent Appointments</h5>
                        <div class="table-responsive">
                            <table class="table" id="recentAppointmentsTable">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Patient</th>
                                        <th>Doctor</th>
                                        <th>Date</th>
                                        <th>Time</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                            <div id="noRecentData" class="text-center text-muted my-3" style="display:none;">No recent appointments found.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script>
        $(document).ready(function() {
            const patients = StorageHelper.get('patients');
            const doctors = StorageHelper.get('doctors');
            const appointments = StorageHelper.get('appointments');

            $('#stat-patients').text(patients.length);
            $('#stat-doctors').text(doctors.length);
            $('#stat-appointments').text(appointments.length);
            $('#stat-cancelled').text(appointments.filter(a => a.status === 'Cancelled').length);

            // Populate recent appointments
            const tbody = $('#recentAppointmentsTable tbody');
            if (appointments.length === 0) {
                $('#noRecentData').show();
            } else {
                // Show last 5
                const recent = [...appointments].reverse().slice(0, 5);
                recent.forEach(app => {
                    const pat = patients.find(p => p.id === app.patientId);
                    const doc = doctors.find(d => d.id === app.doctorId);
                    const patName = pat ? pat.name : 'Unknown';
                    const docName = doc ? doc.name : 'Unknown';
                    const statusClass = 'badge-' + app.status.toLowerCase();
                    tbody.append(`
                        <tr>
                            <td>${app.id}</td>
                            <td class="fw-medium">${patName}</td>
                            <td>${docName}</td>
                            <td>${app.date}</td>
                            <td>${app.time}</td>
                            <td><span class="badge ${statusClass}">${app.status}</span></td>
                        </tr>
                    `);
                });
            }
        });
    </script>
</body>
</html>
