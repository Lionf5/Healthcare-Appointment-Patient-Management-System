<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors - ClinicCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-heartbeat"></i> ClinicCare</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="patients.html">Patients</a></li>
                    <li class="nav-item"><a class="nav-link active" href="doctors.html">Doctors</a></li>
                    <li class="nav-item"><a class="nav-link" href="appointments.html">Appointments</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container page-wrapper">
        <div class="page-header">
            <h1 class="page-title">Doctor Management</h1>
            <button class="btn btn-primary" id="addDoctorBtn"><i class="fas fa-plus me-2"></i> Add Doctor</button>
        </div>

        <div class="table-wrapper">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by name or specialty...">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table" id="doctorsTable">
                    <thead>
                        <tr>
                            <th>Doctor ID</th>
                            <th>Name</th>
                            <th>Specialization</th>
                            <th>Available Slot</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rendered by JS -->
                    </tbody>
                </table>
                <div id="noDataFound" class="text-center text-muted my-4" style="display:none;">No doctors found.</div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Doctor Modal -->
    <div class="modal fade" id="doctorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="doctorModalTitle">Add New Doctor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="doctorForm">
                        <input type="hidden" id="editDoctorId">
                        <div class="mb-3">
                            <label class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="doctorName" placeholder="Dr. John Doe">
                            <div class="error-msg"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Specialization <span class="text-danger">*</span></label>
                            <select class="form-select" id="doctorSpecialization">
                                <option value="">Select Specialization</option>
                            </select>
                            <div class="error-msg"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Available Time Slot <span class="text-danger">*</span></label>
                            <select class="form-select" id="doctorTimeSlot">
                                <option value="">Select Time Slot</option>
                            </select>
                            <div class="error-msg"></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveDoctorBtn">Save Doctor</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/doctors.js"></script>
</body>
</html>
